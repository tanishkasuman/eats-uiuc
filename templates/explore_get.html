{% extends "base.html" %}

{% block content %}
    <div class="body" id="explore-page">
        <h1 class="text" id="explore-text"> What are you in the mood for? </h1>

        <div class="search-row">
            <form method="POST" class="explore-form">
                <input name="cuisines" list="cuisines" id="cuisine-selector"
                placeholder="Select a cuisine" readonly onclick="this.value=''" 
                onfocus="this.value=''">
                    <datalist id="cuisines">
                        {% for cuisine in cuisines %}
                            <option value="{{ cuisine }}"> </option>
                        {% endfor %}
                    </datalist>
                <button type="submit" id="explore-submit-button"> Search </button>
            </form>
        </div>
    </div>

{% endblock %}
